databaseChangeLog:
  - changeSet:
      id: 002-fix-ticket-schema
      author: Wilie12
      changes:
        - dropTable:
            tableName: tickets
            cascadeConstraints: true
        - createSequence:
            sequenceName: ticket_number_seq
            startValue: 1
            incrementBy: 1
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ticket_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: 'NEW'
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: VARCHAR(50)
                  defaultValue: 'LOW'
                  constraints:
                    nullable: false
              - column:
                  name: creator_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: assigned_agent_id
                  type: UUID
              - column:
                  name: assigned_team_id
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: sla_deadline
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: resolved_at
                  type: TIMESTAMP WITH TIME ZONE