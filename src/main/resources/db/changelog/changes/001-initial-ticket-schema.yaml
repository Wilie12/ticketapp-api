databaseChangeLog:
  - changeSet:
      id: 001-initial-ticket-schema
      author: Wilie12
      changes:
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: 'NEW'
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: VARCHAR(50)
                  defaultValue: 'LOW'
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP