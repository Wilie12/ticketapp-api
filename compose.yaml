services:

  # =========================================
  # DATABASE
  # =========================================

  postgres:
    image: postgres:16-alpine
    container_name: ticketapp-postgres
    environment:
      POSTGRES_DB: ticketapp
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketapp-network
    restart: unless-stopped

  # =========================================
  # AUTH SERVER (OAUTH 2.0 / OIDC)
  # =========================================

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: ticketapp-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://ticketapp-postgres:5432/ticketapp
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
    command: start-dev
    ports:
      - "8081:8080"
    networks:
      - ticketapp-network
    depends_on:
      - postgres
    restart: unless-stopped

  # =========================================
  # MAIL SERVER (TEST)
  # =========================================

  mailpit:
    image: axllent/mailpit:v1.15.0
    container_name: ticketapp-mailpit
    environment:
      MP_MAX_MESSAGES: 500
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - ticketapp-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ticketapp-network:
    driver: bridge